workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Genki

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bioperflab.app
      groups:
        - ios-credentials
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          npm install
          npm install @capacitor/ios

      - name: Add iOS platform (if not present)
        script: |
          npm install @capacitor/ios
          npx cap add ios || true
          npx cap sync ios
          ls -la ios/ || echo "ios folder not found"
          ls -la ios/App/ || echo "ios/App folder not found"
          find . -name "Podfile" || echo "No Podfile found anywhere"
          ls -la ios/
          ls -la ios/App/
          pod install --project-directory=ios/App

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
