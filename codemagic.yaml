workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Genki

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bioperflab.app
      groups:
        - ios-credentials
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: latest
      xcode: latest

    scripts:
      - name: Install npm dependencies
        script: |
          npm install
          npm install @capacitor/ios

      - name: Add iOS platform (if not present)
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Install certificate and provisioning profile
        script: |
          # Install provisioning profile
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo $PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          UUID=$(grep -a -A1 'UUID' /tmp/profile.mobileprovision | grep -io '[-A-F0-9]\{36\}')
          cp /tmp/profile.mobileprovision "$PROFILES_DIR/$UUID.mobileprovision"
          echo "Installed provisioning profile: $UUID"

          # Install certificate into keychain
          echo $CERTIFICATE | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "1234" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS app
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>HY55Y7VZNJ</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.bioperflab.app</key>
              <string>BioPerformanceLab_AppStore</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -allowProvisioningUpdates \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
