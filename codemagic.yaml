workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Genki2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bioperflab.app
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: latest
      xcode: latest

    scripts:
      - name: Install npm dependencies
        script: |
          npm install
          npm install @capacitor/ios

      - name: Add iOS platform (if not present)
        script: |
          npx cap add ios || true
          npx cap sync ios
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" ios/App/App/Info.plist

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS app
        script: |
          BUILD_NUMBER=$(date +%s)
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER
          cd ../..
          xcode-project build-ipa \
            --workspace ios/App/App.xcodeproj/project.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
