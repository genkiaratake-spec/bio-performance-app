workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Genki

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bioperflab.app
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUILD_NUMBER: 2
      node: latest
      xcode: latest

    scripts:
      - name: Install npm dependencies
        script: |
          npm install
          npm install @capacitor/ios

      - name: Add iOS platform (if not present)
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcodeproj/project.xcworkspace \
            --scheme App \
            --config Release \
            --build-number $BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
